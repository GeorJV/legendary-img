<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinapsis Lab | Legendary IMG</title>
    <style>
        body { 
            background: #000; 
            color: #00f2ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(10, 10, 10, 0.9);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            text-align: center;
            max-width: 450px;
        }
        h1 { font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 0.5rem; text-shadow: 0 0 15px #00f2ff; }
        p { color: #888; margin-bottom: 2rem; }
        input { 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px;
            margin-bottom: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        button { 
            background: #00f2ff; 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>SINAPSIS LAB</h1>
        <p>Copywriting 5.0 • Visual Intelligence</p>
        <input type="text" id="prompt" placeholder="¿Qué quieres crear hoy?">
        <button onclick="generar()">Generar Imagen</button>
        <div id="contenedor-imagen" style="margin-top: 20px; display: none;">
    <img id="foto-ia" src="" style="width: 100%; border-radius: 10px; border: 1px solid #00f2ff; box-shadow: 0 0 15px #00f2ff;">
    <br>
    <a id="link-descarga" href="#" download="sinapsis-lab-arte.png" style="color: #fff; text-decoration: none; font-size: 0.8rem; margin-top: 10px; display: inline-block;">⬇ Descargar Imagen</a>
</div>
    </div>

    <script>
       async function generar() {
    const promptInput = document.getElementById('prompt');
    const boton = document.querySelector('button');
    const prompt = promptInput.value;

    if(!prompt) return alert("Escribe una descripción, George.");

    boton.innerText = "GENERANDO...";
    boton.disabled = true;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await response.json();
        console.log("Respuesta de la IA:", data);
        alert("¡Conexión completada! Revisa la consola (F12) para ver la respuesta de la IA.");
        
    } catch (error) {
        alert("Hubo un error en la conexión.");
    } finally {
        boton.innerText = "GENERAR IMAGEN";
        boton.disabled = false;
    }
}
    </script>
</body>
</html>
