<script>
        async function generar() {
            const promptInput = document.getElementById('prompt');
            const boton = document.getElementById('btn-accion');
            const prompt = promptInput.value;
            
            if(!prompt) return alert("Escribe una descripción, George.");

            // Estado de carga visual
            boton.innerText = "PROCESANDO SINAPSIS...";
            boton.disabled = true;

            try {
                // 1. Llamada a tu API en Vercel
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (data.success) {
                    // 2. Si la API da luz verde, activamos el motor visual
                    const seed = Math.floor(Math.random() * 99999);
                    const urlFinal = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;
                    
                    const imgElement = document.getElementById('foto-ia');
                    const contenedor = document.getElementById('contenedor-resultado');
                    const descarga = document.getElementById('link-descarga');

                    imgElement.src = urlFinal;
                    descarga.href = urlFinal;
                    
                    // Solo mostramos el resultado cuando la imagen esté realmente cargada
                    imgElement.onload = () => {
                        contenedor.style.display = "block";
                        boton.innerText = "GENERAR IMAGEN";
                        boton.disabled = false;
                        contenedor.scrollIntoView({ behavior: 'smooth' });
                    };
                } else {
                    throw new Error("Respuesta de API no exitosa");
                }

            } catch (error) {
                console.error("Error en el flujo:", error);
                alert("Hubo un error en la conexión creativa.");
                boton.innerText = "GENERAR IMAGEN";
                boton.disabled = false;
            }
        }
    </script>
