<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinapsis Lab | Legendary IMG</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(10, 10, 10, 0.9); padding: 2.5rem; border-radius: 20px; border: 1px solid #00f2ff; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center; max-width: 450px; width: 100%; }
        h1 { font-size: 2rem; letter-spacing: 4px; margin-bottom: 0.5rem; text-shadow: 0 0 15px #00f2ff; }
        p { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 1rem; box-sizing: border-box; outline: none; }
        button { background: #00f2ff; color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #contenedor-resultado { margin-top: 25px; display: none; }
        #foto-ia { width: 100%; border-radius: 10px; border: 1px solid #00f2ff; background: #111; }
        .status { color: #00f2ff; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SINAPSIS LAB</h1>
        <p>Copywriting 5.0 • Visual Intelligence</p>
        <input type="text" id="prompt" placeholder="¿Qué quieres crear hoy?">
        <button id="btn-accion" onclick="generar()">Generar Imagen</button>
        <div id="contenedor-resultado">
            <div id="status-text" class="status">Conectando con la red neuronal...</div>
            <img id="foto-ia" src="" alt="Arte de Sinapsis Lab">
        </div>
    </div>

    <script>
        async function generar() {
            const prompt = document.getElementById('prompt').value;
            const boton = document.getElementById('btn-accion');
            const img = document.getElementById('foto-ia');
            const contenedor = document.getElementById('contenedor-resultado');
            const status = document.getElementById('status-text');

            if(!prompt) return alert("Escribe tu idea, George.");

            boton.innerText = "PROCESANDO SINAPSIS...";
            boton.disabled = true;
            contenedor.style.display = "block";
            status.innerText = "Generando visión...";

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (data.success) {
                    const seed = Math.floor(Math.random() * 999999);
                    // Nueva URL mejorada
                    const urlFinal = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;
                    
                    // Truco: precargar la imagen antes de mostrarla
                    const tempImg = new Image();
                    tempImg.src = urlFinal;
                    
                    tempImg.onload = () => {
                        img.src = urlFinal;
                        status.innerText = "¡Sinapsis completada!";
                        boton.innerText = "GENERAR IMAGEN";
                        boton.disabled = false;
                    };

                    tempImg.onerror = () => {
                        // Si falla, intentamos una ruta alternativa
                        img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}`;
                        status.innerText = "Usando ruta de emergencia...";
                        boton.disabled = false;
                        boton.innerText = "GENERAR IMAGEN";
                    };
                }
            } catch (error) {
                status.innerText = "Error en la conexión.";
                boton.disabled = false;
                boton.innerText = "GENERAR IMAGEN";
            }
        }
    </script>
</body>
</html>
